name: Build and publish packs

# Builds the 5 regional nutaru offline packs from the Open Food Facts JSONL
# dump, uploads the .pack files to a GitHub Release (stable URLs), and deploys
# catalog.json to GitHub Pages. The GLOBAL pack is intentionally omitted until
# its region filter is implemented -- see docs/issue-21-global-pack-filter.md.
#
# Prerequisites (one-time, human -- not controllable from yaml):
#   * repo Settings -> Pages -> Source = "GitHub Actions"
#   * custom domain nutaru.app is a separate DNS + Pages step (spec TODO);
#     until wired the manifest is at <owner>.github.io/<repo>/catalog.json.
# Pack download URLs point at the Release, not Pages, so they are unaffected.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Pack semver (catalog `version` field). Bump per re-export."
        required: true
        default: "1.0.0"
      dump_url:
        description: "Open Food Facts JSONL dump (.gz) URL."
        required: true
        default: "https://static.openfoodfacts.org/data/openfoodfacts-products.jsonl.gz"
      dump_cache_key:
        description: "Cache key for the dump .gz. Bump (e.g. to today's date) to force a re-download."
        required: true
        default: "2026-06-26"
      release_tag:
        description: "GitHub Release tag that hosts the .pack assets (also the download-URL stem)."
        required: true
        default: "packs-v1"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: packs-publish
  cancel-in-progress: false

env:
  PACK_DIR: build/packs
  PAGES_DIR: build/pages

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: "21"
          cache: gradle

      - name: Restore OFF dump from cache
        id: dump-cache
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/off-dump/off-dump.jsonl.gz
          key: off-dump-${{ inputs.dump_cache_key }}

      - name: Download and verify OFF dump
        if: steps.dump-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/off-dump"
          dump_url="${{ inputs.dump_url }}"
          dump_file="${RUNNER_TEMP}/off-dump/off-dump.jsonl.gz"
          remote_name="$(basename "$dump_url")"
          curl -fsSL -o "$dump_file" "$dump_url"
          # OFF publishes a sha256sum file for its .gz exports. Best-effort:
          # warn if our file isn't listed, fail hard on a checksum mismatch.
          curl -fsSL -o gz-sha256sum "https://static.openfoodfacts.org/data/gz-sha256sum"
          expected="$(grep " ${remote_name}\$" gz-sha256sum | awk '{print $1}' || true)"
          actual="$(sha256sum "$dump_file" | awk '{print $1}')"
          if [ -z "$expected" ]; then
            echo "::warning::no sha256 entry for ${remote_name} in gz-sha256sum; skipping integrity check"
          else
            echo "expected=$expected"
            echo "actual=$actual"
            [ "$actual" = "$expected" ] || { echo "::error::sha256 mismatch for $remote_name" >&2; exit 1; }
          fi

      - name: Build pack-compiler
        shell: bash
        run: ./gradlew :pack-compiler:installDist --no-daemon

      - name: Compile packs (5 regions, streamed from the .gz)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${PACK_DIR}" "${PAGES_DIR}"
          compiler="tools/pack-compiler/build/install/pack-compiler/bin/pack-compiler"
          dump_gz="${RUNNER_TEMP}/off-dump/off-dump.jsonl.gz"
          repo="${{ github.repository }}"
          tag="${{ inputs.release_tag }}"
          ver="${{ inputs.version }}"

          # region|pack-id|display-name. GLOBAL is omitted: its filter
          # (OffReader.REGION_TAGS["GLOBAL"] == null) is unimplemented for real
          # data and would keep every product. See
          # docs/issue-21-global-pack-filter.md.
          regions=(
            "US|us|US starter pack"
            "EU-MIX|eu-mix|EU-mix starter pack (DE/FR/ES/IT)"
            "UK|uk|UK starter pack"
            "JP|jp|JP starter pack"
            "BR|br|BR starter pack"
          )

          for entry in "${regions[@]}"; do
            IFS='|' read -r region id name <<< "$entry"
            url="https://github.com/${repo}/releases/download/${tag}/${id}.pack"
            echo "::group::compile ${id} (${region})"
            # Stream zcat into compile; the runner disk (~14 GB) cannot hold the
            # ~15-25 GB uncompressed dump, so we never materialize it. Re-
            # decompressing per region is cheap vs. parsing the export 5x.
            "$compiler" compile \
              --input <(zcat "$dump_gz") \
              --region "$region" \
              --id "$id" \
              --name "$name" \
              --out "${PACK_DIR}/${id}.pack" \
              --version "$ver" \
              --url "$url" \
              --manifest "${PAGES_DIR}/catalog.json"
            echo "::endgroup::"
          done

          echo "::group::catalog"
          cat "${PAGES_DIR}/catalog.json"
          echo "::endgroup::"

      - name: Upsert release assets
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ inputs.release_tag }}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "${PACK_DIR}"/*.pack --clobber
          else
            gh release create "$tag" \
              --target "$GITHUB_SHA" \
              -t "$tag" \
              -n "nutaru offline packs (version ${{ inputs.version }})" \
              "${PACK_DIR}"/*.pack
          fi

      - name: Upload Pages artifact (catalog.json only)
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.PAGES_DIR }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
